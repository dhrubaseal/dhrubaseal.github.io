  <!-- Neural connections: AI + forward-pointing 'D' monogram -->
  <g stroke="url(#djs-stroke)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M24 21 L24 43"/>
    <path d="M24 21 L43 32"/>
    <path d="M24 43 L43 32"/>
  </g>

  <!-- Nodes -->
  <circle cx="24" cy="21" r="3.6" fill="url(#djs-node)"/>
  <circle cx="24" cy="43" r="3.6" fill="url(#djs-node)"/>
  <circle cx="43" cy="32" r="4.6" fill="#60a5fa"/>
