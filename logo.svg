<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Dhruba Jyoti Seal monogram">
  <defs>
    <linearGradient id="djs-stroke" x1="9" y1="6" x2="55" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="djs-node" x1="20" y1="18" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#93c5fd"/>
      <stop offset="1" stop-color="#3b82f6"/>
